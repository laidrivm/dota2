---
schema: spec-driven
context: |
  Conventions and contract rules live in /CLAUDE.md and the docs it
  indexes — follow them. Do not restate them here. This file owns
  architecture choices only.

  Architecture defaults — apply when drafting proposals; a deviation must
  be argued in the design artifact:
  - Realtime: unidirectional server→client streams (notifications,
    progress, live updates) use SSE — Bun.serve streaming + native
    EventSource, zero packages. WebSockets only when the client genuinely
    sends frequent upstream messages.
  - Response shaping is BFF-style: each endpoint is designed from the
    screen that consumes it — one flight per view, no client-side
    waterfalls of dependent requests.
  - Expensive aggregates (stats, analytics) are computed server-side
    behind a cache, never recomputed per page load.
  - N+1 is a UI defect: eager-load/dataloader hints are part of an
    endpoint's definition and get checked at review.
rules:
  proposal:
    - Include a "Non-goals" section
    - When gathering requirements, ask questions one at a time — an answer
      may invalidate the questions that would have followed
    - Write acceptance criteria in EARS form (WHEN <trigger> / IF <unwanted
      condition> THEN / WHILE <state> — the system SHALL <behaviour>), with
      measurable values, not adjectives
    - Scope a proposal to one reviewable cycle. If the feature needs more,
      split it into sequenced proposals, each independently applyable and
      testable — state the sequence in the first proposal's design
  design:
    - For every endpoint, fix the exact response shape per
      /docs/api-design.md
  tasks:
    - Include a test task derived from /zombies output
    - Each task cites the requirement(s) or acceptance criteria it fulfils;
      every criterion is cited by at least one task
